<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .outer {
            width: 50%;
            height: 50px;
            margin: 20px;
            background-color: rgb(119, 89, 89);

        }
        .HTML {
            width: 90%;
            height: 100%;
            font-size: 30px;
            color: white;
            background-color:orange;
            animation: boxhtml 3s ease-in;
        }
        @keyframes boxhtml {
            from {
                width: 10px;
            }
            to {
                width: 90%;
            }
        }
        .CSS {
            width: 75%;
            height: 100%;
            font-size: 30px;
            color: white;
            background-color:blue;
            animation: boxcss 3s ease-in;
        }
        @keyframes boxcss {
            from {
                width: 10px;
            }
            to {
                width: 75%;
            }
        }
        .JS {
            width: 50%;
            height: 100%;
            font-size: 30px;
            color: white;
            background-color:rgb(242, 242, 32);
            animation: boxJS 3s ease-in;
        }
        @keyframes boxJS {
            from {
                width: 10px;
            }
            to {
                width: 50%;
            }
        }
        .PHP {
            width: 40%;
            height: 100%;
            font-size: 30px;
            color: white;
            background-color:rgb(150, 14, 150);
            animation: boxPHP 3s ease-in;
        }
        @keyframes boxPHP {
            from {
                width: 10px;
            }
            to {
                width: 40%;
            }
        }
       
    </style>
</head>
<body>
    <div class="outer">
        <div class="HTML">HTML</div>
    </div>
    <div class="outer">
        <div class="CSS">CSS</div>
    </div>
    <div class="outer">
        <div class="JS">JS</div>
    </div>
    <div class="outer">
        <div class="PHP">PHP</div>
    </div>
</body>
</html>
